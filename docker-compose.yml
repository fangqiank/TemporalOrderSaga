# docker-compose.yml
services:
  postgresql:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 3s
      retries: 10

  temporal:
    image: temporalio/auto-setup:1.25.2
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=postgresql
    ports:
      - "7233:7233"   # gRPC for workers/clients
      - "8233:8233"   # HTTP for Web UI
    healthcheck:
      test: ["CMD-SHELL", "temporal operator cluster describe --address $$(hostname -i):7233"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s

  temporal-ui:
    image: temporalio/ui:2.49.1
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:8080
      - TEMPORAL_UI_PORT=8080
    ports:
      - "8080:8080"

volumes:
  pgdata: